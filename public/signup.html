<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PostIt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><h1>PostIt</h1></a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="login-section">
            <div class="login-container">
                <h2>Sign Up</h2>
                <div id="errorMessage" style="display: none; color: #e74c3c; margin-bottom: 1rem; padding: 0.75rem; background: #fadbd8; border-radius: 4px;"></div>
                <form id="signupForm" class="login-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="8">
                        <small style="color: #666; margin-top: 0.25rem;">Minimum 8 characters</small>
                    </div>
                    <div class="form-group">
                        <label for="password_confirmation">Confirm Password</label>
                        <input type="password" id="password_confirmation" name="password_confirmation" required minlength="8">
                    </div>
                    <button type="submit" class="btn-primary">Sign Up</button>
                </form>
                <p class="signup-link">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PostIt. All rights reserved.</p>
        </div>
    </footer>

    <script src="signup.js"></script>
</body>
</html>
