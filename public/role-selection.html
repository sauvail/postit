<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Role - PostIt</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><h1>PostIt</h1></a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="login-section">
            <div class="login-container">
                <h2>Choose Your Role</h2>
                <p style="text-align: center; margin-bottom: 2rem; color: #666;">
                    How would you like to use PostIt today?
                </p>
                <div id="errorMessage" style="display: none; color: #e74c3c; margin-bottom: 1rem; padding: 0.75rem; background: #fadbd8; border-radius: 4px;"></div>
                <div class="role-selection">
                    <button id="athleteBtn" class="role-btn">
                        <h3>Athlete</h3>
                        <p>Track your training and progress</p>
                    </button>
                    <button id="coachBtn" class="role-btn">
                        <h3>Coach</h3>
                        <p>Manage athletes and programs</p>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PostIt. All rights reserved.</p>
        </div>
    </footer>

    <script src="role-selection.js"></script>
</body>
</html>
